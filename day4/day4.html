<body>
    <!-- 
    css- cascading style sheet language
    css is a style sheet language that is used to describe the presentaiton of
    a webpage
    it deals with the colors,fonts, animations, layouts



    how we can insert css
    1) inline css- styles will applied directly to the element
    <h1 style='color:red;'>inline style</h1>

    2) internal css- styles will be applied to the document using
    style tag in head section
    in head section
    <style>
        //css syntax
        //selector{declaration}
        selector-it is used to target the html elements for applying styles

        selector{
        declartion1;
        declartion2;}

        div{
        color:red;
        background:blue;
        }
    </style>

    3) external styling
    it is used to apply styles to the multiple pages

    create a file with .css extension

    link with link tag
    <link rel="stylesheet" href="style.css">

  <h1 style='color:red;'>inline style</h1>

    <div>internal styling</div>

    <h3>external</h3>


    inline having high priority
    internal or external it depends on how we are defining


    types of selector
    1) simple selectors
       a) element selector
        h1{
        color:red;
        }

        b) class selector
        we can apply styles for multiple elements
        <div class='el1 el1a'>content</div>

        .el1{
        color:green;
        }
        .el1a{
        background: blue;
        }

        3) id selector
        we can apply styles uniquely
        #e1{
        background:yellow;
        }

    2) combinators
    3) pseudo class


    boxmodel
    every html elements holds four componets
    
    1) content ---width and height
       width:200px;
       height:200px;

    2) padding---space around the content
       padding: 50px;
       padding:10px 20px 30px 40px;
       padding:10px 20px 30px ;
       padding:10px 20px;
    3) border--a line around an element
       border:width style color;
       border : 2px solid red;

       border styles---solid double dashed dotted ridge groove none

    4) margin--space outside of an element
       margin: 50px;
       margin:10px 20px 30px 40px;
       margin:10px 20px 30px ;
       margin:10px 20px;

    
    elements are divided based on behaviouur

    1) inline elements- are the elements which takes necessary space and doesnt starts on new line
    we cannot apply width height margintop and bottom
            span{
            background:lightseagreen;
            width:200px;
            height:200px;
            padding:20px;
            margin:20px 30px;
        }
    2) block elements- are the elements which occupes total space and always
        starts on new line
        h1{
        display:inline;
        }
        a{
        display:block;
        }

    3) display:inline-block
    it will behave inline elements but takes properties like block level element
